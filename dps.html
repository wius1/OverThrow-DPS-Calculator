<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DPS калькулятор</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="btn" href="index.html">← На главную</a>
    </div>

    <div class="app-shell">
      <div class="app-header">
        <h3>⚔️ DPS калькулятор</h3>
      </div>

      <div class="app-body">
        <div class="settings-card preview-card" id="previewCard">
          <div class="preview-title">⚔ Атака</div>

          <div class="preview-row">
            <span class="preview-label">⚔️ Урон</span>
            <span class="preview-value" id="previewDamage">
              0 <span class="preview-extra">(0 +0%)</span>
            </span>
          </div>

          <div class="preview-row" id="previewCritRow">
            <span class="preview-label">🎯 Крит</span>
            <span class="preview-value" id="previewCrit">
              0.00% <span class="preview-extra">+0.00%</span>
            </span>
          </div>

          <div class="preview-row">
            <span class="preview-label">💨 Скорость</span>
            <span class="preview-value" id="previewSpeed">
              -0.00% <span class="preview-extra">КД</span>
            </span>
          </div>

          <div class="preview-row">
            <span class="preview-label">⚡ DPS</span>
            <span class="preview-value" id="previewDps">
              0.00 <span class="preview-extra">DPS</span>
            </span>
          </div>
        </div>

        <div class="settings-card">
          <div class="settings-section-title">Оружие</div>
          <div class="weapon-switch">
            <div class="weapon active" id="sword" onclick="setWeapon('sword')">🗡️ Меч</div>
            <div class="weapon" id="axe" onclick="setWeapon('axe')">🪓 Топор</div>
          </div>
        </div>

        <div class="settings-card">
          <div class="settings-section-title">Основные параметры</div>
          <div class="grid">
            <div class="field">
              <label for="attack">⚔️ Атака</label>
              <input id="attack" type="text" placeholder="Например: 2985">
            </div>

            <div class="field">
              <label for="attackSkill">⚔️ Навык атаки %</label>
              <input id="attackSkill" type="text" placeholder="Например: 18%">
            </div>

            <div class="field">
              <label for="speed">💨 Скорость %</label>
              <input id="speed" type="text" placeholder="Например: 17%">
            </div>
          </div>
        </div>

        <div class="settings-card" id="critCard">
          <div class="settings-section-title">Крит</div>
          <div class="grid">
            <div class="field">
              <label for="critChance">💥 Крит шанс %</label>
              <input id="critChance" type="text" placeholder="Например: 18%">
            </div>

            <div class="field">
              <label for="critSkill">💥 Навык крит шанс %</label>
              <input id="critSkill" type="text" placeholder="Например: 8%">
            </div>

            <div class="field">
              <label for="critMulti">🔥 Крит множитель</label>
              <input id="critMulti" type="text" placeholder="Например: 1.95">
            </div>
          </div>
        </div>

        <div class="settings-card">
          <div class="settings-section-title">Итог</div>
          <div class="result" id="out">DPS: 0.00</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let weapon = "sword";

    const attackInput = document.getElementById("attack");
    const attackSkillInput = document.getElementById("attackSkill");
    const critChanceInput = document.getElementById("critChance");
    const critSkillInput = document.getElementById("critSkill");
    const critMultiInput = document.getElementById("critMulti");
    const speedInput = document.getElementById("speed");

    const previewCard = document.getElementById("previewCard");
    const previewCritRow = document.getElementById("previewCritRow");
    const critCard = document.getElementById("critCard");
    const out = document.getElementById("out");

    function n(v) {
      if (!v) return 0;
      return Number(String(v).replace("%", "").replace(",", ".").trim()) || 0;
    }

    function round2(x) {
      return Number(x).toFixed(2);
    }

    function hasAnyValue() {
      return [
        attackInput.value,
        attackSkillInput.value,
        critChanceInput.value,
        critSkillInput.value,
        critMultiInput.value,
        speedInput.value
      ].some(v => String(v).trim() !== "");
    }

    function setWeapon(w) {
      weapon = w;

      document.getElementById("sword").classList.toggle("active", w === "sword");
      document.getElementById("axe").classList.toggle("active", w === "axe");

      critCard.classList.toggle("hidden", w !== "sword");
      previewCritRow.classList.toggle("hidden", w !== "sword");

      updatePreview();
    }

    function calculateValues() {
      const atk = n(attackInput.value);
      const atkS = n(attackSkillInput.value);
      const speedV = n(speedInput.value);

      const weaponDamage = atk;
      const totalDamage = weaponDamage * (1 + atkS / 100);

      const baseInterval = weapon === "sword" ? 500 : 700;
      const interval = baseInterval * (1 - speedV / 100);
      const hitsPerSecond = interval > 0 ? 1000 / interval : 0;

      let totalCrit = 0;
      let critSkill = 0;
      let avgDamage = totalDamage;

      if (weapon === "sword") {
        const baseCrit = n(critChanceInput.value);
        critSkill = n(critSkillInput.value);
        const critMultiplier = n(critMultiInput.value);

        totalCrit = baseCrit + critSkill;

        if (critMultiplier > 0) {
          avgDamage = totalDamage * (1 + (critMultiplier - 1) * totalCrit / 100);
        }
      }

      const dps = avgDamage * hitsPerSecond;

      return {
        weaponDamage,
        totalDamage,
        attackSkill: atkS,
        totalCrit,
        critSkill,
        speed: speedV,
        dps
      };
    }

    function updatePreview() {
      const visible = hasAnyValue();
      previewCard.classList.toggle("visible", visible);

      if (!visible) {
        out.textContent = "DPS: 0.00";
        return;
      }

      const data = calculateValues();

      document.getElementById("previewDamage").innerHTML =
        `${round2(data.totalDamage)} <span class="preview-extra">(${round2(data.weaponDamage)} +${round2(data.attackSkill)}%)</span>`;

      if (weapon === "sword") {
        document.getElementById("previewCrit").innerHTML =
          `${round2(data.totalCrit)}% <span class="preview-extra">+${round2(data.critSkill)}%</span>`;
      }

      document.getElementById("previewSpeed").innerHTML =
        `-${round2(data.speed)}% <span class="preview-extra">КД</span>`;

      document.getElementById("previewDps").innerHTML =
        `${round2(data.dps)} <span class="preview-extra">DPS</span>`;

      out.textContent = `DPS: ${round2(data.dps)}`;
    }

    [
      attackInput,
      attackSkillInput,
      critChanceInput,
      critSkillInput,
      critMultiInput,
      speedInput
    ].forEach(input => {
      input.addEventListener("input", updatePreview);
    });

    setWeapon("sword");
    updatePreview();
  </script>
</body>
</html>
