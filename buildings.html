<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>Калькулятор построек</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .building-wrap {
      display: grid;
      gap: 14px;
    }

    .building-level-control {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .building-level-btn {
      min-height: 44px;
      padding: 0;
      font-size: 22px;
      line-height: 1;
    }

    .building-level-input {
      text-align: center;
      font-weight: 700;
      -moz-appearance: textfield;
    }

    .building-level-input::-webkit-outer-spin-button,
    .building-level-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .building-range {
      width: 100%;
    }

    .building-card {
      background: #252538;
      border-radius: 12px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .building-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .building-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .building-icon {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex: 0 0 auto;
    }

    .building-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .building-sub {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }

    .building-stats {
      display: grid;
      gap: 8px;
    }

    .hq-stat-card {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      background: #1f2333;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .hq-stat-card span:first-child {
      color: #bbb;
      font-size: 13px;
    }

    .hq-stat-card .val {
      color: #fff;
      font-weight: 700;
      text-align: right;
    }

    .building-error {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(244, 67, 54, 0.12);
      color: #ffb4b4;
      border: 1px solid rgba(244, 67, 54, 0.22);
    }

    .boost-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      color: #ddd;
      font-size: 14px;
      line-height: 1.2;
      cursor: pointer;
      user-select: none;
    }

    .boost-toggle input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #4caf50;
      vertical-align: middle;
      flex: 0 0 auto;
    }

    .boosts-grid,
    .skill-boosts-grid {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .boosts-grid.visible,
    .skill-boosts-grid.visible {
      display: grid;
    }

    .boost-card {
      background: #1f2333;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .boost-val {
      color: #fff;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .boost-label {
      color: #aaa;
      font-size: 12px;
    }

    .boost-card input {
      width: 100%;
      margin-top: 8px;
    }

    .cores-panel {
      background: #252538;
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .cores-header {
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
    }

    .mine-cores-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .core-slot {
      min-height: 72px;
      border-radius: 10px;
      background: #1f2333;
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 6px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    .core-slot:hover {
      transform: translateY(-1px);
    }

    .core-slot.empty {
      background: #23283a;
    }

    .core-slot.locked {
      opacity: 0.25;
      cursor: default;
    }

    .slot-plus {
      font-size: 24px;
      color: #ddd;
      line-height: 1;
    }

    .slot-emoji {
      font-size: 22px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .slot-level {
      font-size: 11px;
      color: #bbb;
    }

    .slot-mult {
      font-size: 11px;
      color: #fff;
      font-weight: 700;
      margin-top: 2px;
    }

    .core-totals-list {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }

    .core-total-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: #ddd;
    }

    .core-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .core-modal-backdrop.visible {
      display: flex;
    }

    .core-modal {
      width: min(420px, 100%);
      background: #252538;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px;
    }

    .core-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .core-modal-title {
      font-weight: 700;
      color: #fff;
    }

    .core-type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .core-type-btn {
      background: #1f2333;
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      text-align: left;
    }

    .core-type-btn.active {
      border-color: #4caf50;
      background: #223228;
    }

    .core-level-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .core-level-btn {
      min-height: 44px;
      padding: 0;
      font-size: 22px;
      line-height: 1;
    }

    .core-level-input {
      text-align: center;
      font-weight: 700;
      -moz-appearance: textfield;
    }

    .core-level-input::-webkit-outer-spin-button,
    .core-level-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .core-preview {
      background: #1f2333;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
      color: #fff;
    }

    .core-modal-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .core-modal-actions .btn {
      flex: 1;
    }

    @media (max-width: 760px) {
      .boosts-grid,
      .skill-boosts-grid,
      .core-type-grid {
        grid-template-columns: 1fr;
      }

      .mine-cores-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="btn" href="index.html">← На главную</a>
    </div>

    <div class="app-shell">
      <div class="app-header">
        <h3>🏭 Калькулятор построек</h3>
      </div>

      <div class="app-body">
        <div class="building-wrap">
          <div class="settings-card">
            <div class="settings-section-title">Уровень постройки</div>

            <div class="building-level-control">
              <button type="button" class="btn building-level-btn" id="levelMinus">-</button>
              <input id="levelInput" class="building-level-input" type="number" min="1" max="130" value="1" inputmode="numeric">
              <button type="button" class="btn building-level-btn" id="levelPlus">+</button>
            </div>

            <input id="levelRange" class="building-range" type="range" min="1" max="130" value="1">

            <label class="boost-toggle">
              <input id="boostsToggle" type="checkbox">
              <span>Бусты от фермы и клана</span>
            </label>

            <div class="boosts-grid" id="boostsGrid">
              <div class="boost-card">
                <div class="boost-val">🌿 +<span id="farmBoostPreview">0</span>%</div>
                <div class="boost-label">Буст от фермы</div>
                <input id="farmBoost" type="number" value="0" step="1">
              </div>

              <div class="boost-card">
                <div class="boost-val">⚡ +<span id="clanIncomeBoostPreview">0</span>%</div>
                <div class="boost-label">Доход клана</div>
                <input id="clanIncomeBoost" type="number" value="0" step="1">
              </div>

              <div class="boost-card">
                <div class="boost-val">🛡️ +<span id="clanDefenseBoostPreview">0</span>%</div>
                <div class="boost-label">Защита клана</div>
                <input id="clanDefenseBoost" type="number" value="0" step="1">
              </div>

              <div class="boost-card">
                <div class="boost-val" style="color:#00ff88">🚀 x<span id="clanMultiplierPreview">1</span></div>
                <div class="boost-label">Буст клана</div>
                <input id="clanMultiplier" type="number" value="1" step="0.1" min="1">
              </div>
            </div>

            <label class="boost-toggle">
              <input id="skillBoostsToggle" type="checkbox">
              <span>Бусты от навыков</span>
            </label>

            <div class="skill-boosts-grid" id="skillBoostsGrid">
              <div class="boost-card">
                <div class="boost-val">💰 +<span id="skillIncomePreview">0</span>%</div>
                <div class="boost-label">Доход</div>
                <input id="skillIncomeBoost" type="number" value="0" min="0" max="20" step="1">
              </div>

              <div class="boost-card">
                <div class="boost-val">📦 +<span id="skillCapacityPreview">0</span>%</div>
                <div class="boost-label">Вместимость</div>
                <input id="skillCapacityBoost" type="number" value="0" min="0" max="20" step="1">
              </div>

              <div class="boost-card">
                <div class="boost-val">❤️ +<span id="skillHpPreview">0</span>%</div>
                <div class="boost-label">Прочность</div>
                <input id="skillHpBoost" type="number" value="0" min="0" max="20" step="1">
              </div>

              <div class="boost-card">
                <div class="boost-val">♻️ +<span id="skillRegenPreview">0</span>%</div>
                <div class="boost-label">Реген</div>
                <input id="skillRegenBoost" type="number" value="0" min="0" max="20" step="1">
              </div>
            </div>

            <div class="building-error" id="buildingError"></div>
          </div>

          <div class="building-card">
            <div class="building-header">
              <div class="building-title">
                <div class="building-icon" id="buildingIcon">🌾</div>
                <div>
                  <div class="building-name" id="buildingName">Поле</div>
                  <div class="building-sub">Ур. <span id="buildingLevelTitle">1</span></div>
                </div>
              </div>
            </div>

            <div class="building-stats">
              <div class="hq-stat-card">
                <span>Доход</span>
                <span class="val" id="statIncome">50/ч</span>
              </div>

              <div class="hq-stat-card">
                <span>Ёмкость</span>
                <span class="val" id="statCapacity">8400</span>
              </div>

              <div class="hq-stat-card">
                <span>♻️ Реген</span>
                <span class="val" id="statRegen">125/ч</span>
              </div>

              <div class="hq-stat-card">
                <span>❤️ Макс HP</span>
                <span class="val" id="statHp">500</span>
              </div>
            </div>

            <div class="cores-panel">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;">
                <button class="btn" id="clearCoresBtn" type="button">Очистить</button>
                <div class="cores-header" id="coresHeader" style="margin-bottom:0;">🔮 Ядра 1/10 <span style="color:#555;font-weight:400" id="coresNextUnlock"></span></div>
              </div>

              <div class="mine-cores-grid" id="coresGrid"></div>
              <div class="core-totals-list" id="coreTotalsList"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="core-modal-backdrop" id="coreModalBackdrop">
      <div class="core-modal">
        <div class="core-modal-header">
          <div class="core-modal-title">Настройка ядра</div>
          <button class="btn" id="coreModalClose">✕</button>
        </div>

        <div class="core-type-grid" id="coreTypeGrid">
          <button class="core-type-btn" data-type="income">✴️ Ядро дохода</button>
          <button class="core-type-btn" data-type="capacity">✳️ Ядро вместимости</button>
          <button class="core-type-btn" data-type="hp">❤️ Ядро здоровья</button>
          <button class="core-type-btn" data-type="regen">♻️ Ядро регенерации</button>
        </div>

        <div class="core-level-row">
          <button type="button" class="btn core-level-btn" id="coreLevelMinus">-</button>
          <input id="coreLevelInput" class="core-level-input" type="number" min="0" max="999" value="0" inputmode="numeric">
          <button type="button" class="btn core-level-btn" id="coreLevelPlus">+</button>
        </div>

        <div class="core-preview" id="corePreview">✴️ lv.0 → x1</div>

        <div class="core-modal-actions">
          <button class="btn btn-primary" id="coreSaveBtn">Сохранить</button>
          <button class="btn" id="coreRemoveBtn">Убрать</button>
          <button class="btn" id="coreCancelBtn">Отмена</button>
        </div>
      </div>
    </div>

    <script src="buildings.js"></script>
  </div>
</body>
</html>
