<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPS + Награды</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111827;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* tabs */
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab {
  padding: 10px 16px;
  border-radius: 10px;
  background: #374151;
  cursor: pointer;
}

.tab.active {
  background: #2563eb;
}

/* sections */
.section {
  display: none;
}

.section.active {
  display: block;
}

/* calculator */
input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.result {
  margin-top: 15px;
  font-size: 20px;
}

/* rewards */
.level {
  background: #1f2937;
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>
<div class="container">

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="openTab('dps')">⚔️ DPS</div>
  <div class="tab" onclick="openTab('rewards')">🎁 Награды</div>
</div>

<!-- DPS -->
<div id="dps" class="section active">

<select id="weapon">
  <option value="sword">🗡️ Меч</option>
  <option value="axe">🪓 Топор</option>
</select>

<input id="attack" placeholder="⚔️ Атака">
<input id="attackSkill" placeholder="⚔️ Навык атаки %">

<div id="critBlock">
<input id="critChance" placeholder="💥 Крит шанс %">
<input id="critSkill" placeholder="💥 Навык крит шанс %">
<input id="critMulti" placeholder="🔥 Крит множитель">
</div>

<input id="speed" placeholder="💨 Скорость %">

<button onclick="calc()">Посчитать DPS</button>

<div class="result" id="out"></div>

</div>

<!-- REWARDS -->
<div id="rewards" class="section">

<div id="rewardList"></div>

</div>

</div>

<script>
/* tabs */
function openTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

/* parse */
function n(v){
  return Number(v.replace('%','').replace(',','.')) || 0;
}

/* calc */
function calc(){
  let weapon = document.getElementById('weapon').value;
  let atk = n(attack.value);
  let atkS = n(attackSkill.value);
  let speed = n(speed.value);

  let base = atk * (1 + atkS/100);

  let interval = (weapon=='sword'?500:700)*(1-speed/100);
  let hits = 1000/interval;

  let dmg = base;

  if(weapon=='sword'){
    let crit = n(critChance.value)+n(critSkill.value);
    let multi = n(critMulti.value);
    dmg = base*(1+(multi-1)*crit/100);
  }

  let dps = dmg*hits;

  out.innerHTML = "DPS: "+dps.toFixed(2);
}

/* rewards data */
const rewards = [
"60 💎40 🎁x1",

/* render rewards */
const list = document.getElementById("rewardList");
rewards.forEach(r=>{
  let div = document.createElement("div");
  div.className="level";
  div.innerText=r;
  list.appendChild(div);
});
</script>

</body>
</html>
